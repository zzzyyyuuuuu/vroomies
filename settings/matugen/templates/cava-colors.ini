[general]
bars = 0
bar_width = 2
bar_spacing = 1
framerate = 60
autosens = 1
sensitivity = 100

[input]
method = pulse
source = auto

[output]
method = ncurses
data_format = ascii
ascii_max_range = 7

[color]
background = 'default'
foreground = '{{colors.primary.default.hex}}'

gradient = 1
gradient_color_1 = '{{colors.primary_container.default.hex}}'
gradient_color_2 = '{{colors.primary.default.hex}}'
gradient_color_3 = '{{colors.on_primary_container.default.hex}}'

[smoothing]
integral = 77
gravity = 100
monstercat = 1
noise_reduction = 0.77

[layout]
spacing = 0
